name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r training-service/requirements.txt
          pip install -r serving-service/requirements.txt
          pip install pytest flake8

      - name: Lint (flake8)
        run: flake8 --max-line-length 120 --extend-ignore E501,W503,E203 training-service/app serving-service/app monitoring-service/app

      - name: Run tests
        run: pytest tests/ -v
